<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Snake Pro - Vinoth Raja</title>
    
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <script src="js/supabase.js"></script>
    
    <style>
        :root {
            --bg: #0b0e14; --panel: #161b22; --accent: #58a6ff;
            --danger: #f85149; --success: #3fb950;
        }
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; }
        
        #main-layout {
            display: grid;
            grid-template-columns: 340px 1fr 300px;
            height: 100vh; gap: 20px; 
            padding: 40px 20px; /* Symmetrical top/bottom spacing */
            box-sizing: border-box;
        }

        aside { background: var(--panel); padding: 20px; border-radius: 8px; display: flex; flex-direction: column; border: 1px solid #30363d; }
        
        #ui-controls {
            display: flex;
            flex-direction: column;
            gap: 15px; 
            margin-top: 10px;
            margin-bottom: 20px;
            overflow-y: auto; 
            padding-right: 5px;
        }

        #ui-controls::-webkit-scrollbar { width: 6px; }
        #ui-controls::-webkit-scrollbar-thumb { background: #30363d; border-radius: 3px; }

        .input-group { 
            display: flex; 
            flex-direction: column; 
            gap: 8px; 
            font-size: 0.95rem; 
            padding-bottom: 15px;
            border-bottom: 1px dashed #30363d; 
        }
        
        .input-group:last-child { border-bottom: none; padding-bottom: 0; }
        
        select, input[type="range"] { 
            background: #0d1117; color: white; border: 1px solid #30363d; padding: 10px; border-radius: 4px; cursor: pointer;
        }

        .nav-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 5px; border-bottom: 1px solid #30363d; padding-bottom: 15px;}
        .back-btn { text-decoration: none; color: var(--accent); font-weight: bold; font-size: 0.95rem; }
        
        .btn {
            background: var(--success); border: none; color: white; padding: 14px;
            border-radius: 4px; cursor: pointer; font-weight: bold; font-size: 1rem; transition: 0.2s; width: 100%;
        }
        .btn:disabled { background: #30363d; cursor: not-allowed; opacity: 0.5; }

        #game-area { display: flex; align-items: center; justify-content: center; position: relative; background: #000; border-radius: 8px; border: 2px solid #30363d; }
        canvas { background: #000; display: block; box-shadow: 0 0 20px rgba(0,0,0,0.5); }

        .score-item { padding: 12px 0; border-bottom: 1px solid #30363d; font-size: 0.85rem; }
        .score-meta { color: #8b949e; font-size: 0.75rem; margin-top: 6px; }

        .frozen { opacity: 0.3; pointer-events: none; }

        #shape-preview {
            width: 45px; height: 45px; border: 1px solid #58a6ff; 
            border-radius: 4px; display: flex; align-items: center; 
            justify-content: center; font-size: 26px; background: #0d1117;
        }

        #overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85); display: flex; flex-direction: column;
            align-items: center; justify-content: center; display: none; z-index: 10;
        }
    </style>
</head>
<body>

<div id="main-layout">
    <aside id="settings-panel">
        <div class="nav-header">
            <a href="dashboard.html" class="back-btn">&larr; Back to Home</a>
            <h3 style="margin:0; font-size: 1.1rem; color: var(--accent);">Game Config</h3>
        </div>
        
        <div id="ui-controls">
            <div class="input-group">
                <label>Arena Size</label>
                <select id="arena-size">
                    <option value="300">Small (15x15)</option>
                    <option value="400" selected>Medium (20x20)</option>
                    <option value="600">Large (30x30)</option>
                </select>
            </div>
            
            <div class="input-group">
                <label>Wall Mode</label>
                <select id="wall-mode">
                    <option value="solid">Solid (Thick Walls)</option>
                    <option value="pass">Ghost (Pass-thru Walls)</option>
                </select>
            </div>
            
            <div class="input-group">
                <label>Maze Complexity (💀 Skulls)</label>
                <input type="range" id="maze-complexity" min="0" max="30" value="10">
            </div>

            <div class="input-group">
                <label>Snake Speed (1 = Slow, 10 = Fast)</label>
                <input type="range" id="snake-speed" min="1" max="10" value="5">
            </div>
            
            <div class="input-group">
                <label>Snake Head Shape</label>
                <div style="display: flex; gap: 10px; align-items: center;">
                    <select id="snake-shape" style="flex-grow:1">
                        <option value="😀">Grinning Face (😀)</option>
                        <option value="😁">Beaming Smile (😁)</option>
                        <option value="😉">Winking Face (😉)</option>
                        <option value="🤩">Star-Struck (🤩)</option>
                        <option value="hexagon">Hexagon</option>
                        <option value="circle">Circle</option>
                        <option value="square">Classic Square</option>
                    </select>
                    <div id="shape-preview">😀</div>
                </div>
            </div>
            
            <div class="input-group">
                <label>Body Color</label>
                <input type="color" id="snake-color" value="#3fb950" style="height:40px; width:100%; cursor:pointer;">
            </div>
        </div>

        <button id="start-btn" class="btn">START MISSION</button>
        
        <div style="margin-top:auto; padding:15px; background:#0d1117; border-radius:4px; text-align: center; border: 1px solid #30363d;">
            <small style="color: #8b949e; text-transform: uppercase; letter-spacing: 1px;">Current Score</small>
            <div id="score-val" style="font-size:2.5rem; font-weight:bold; color:var(--success)">0</div>
        </div>
    </aside>

    <main id="game-area">
        <canvas id="gameCanvas"></canvas>
        <div id="overlay">
            <h1 style="color:var(--danger); margin-bottom:5px; font-size: 2.5rem;">MISSION FAILED</h1>
            <p id="final-stats" style="text-align: center; line-height: 1.6; color: #ccc; font-size: 1.1rem;"></p>
            <button onclick="unlockAndReset()" class="btn" style="background:var(--accent); margin-top:20px; padding: 12px 40px; width:auto;">Adjust Settings</button>
        </div>
    </main>

    <aside>
        <h4 style="margin:0 0 10px 0; border-bottom: 1px solid #30363d; padding-bottom: 10px; color: var(--accent);">Live Leaderboard</h4>
        <div id="score-board" style="overflow-y:auto; flex-grow: 1;">
            <div id="leaderboard-status" style="padding: 10px; color: #8b949e;">Connecting to Supabase...</div>
        </div>
    </aside>
</div>

<script id="game-engine">
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const ui = document.getElementById('ui-controls');
    const startBtn = document.getElementById('start-btn');
    const overlay = document.getElementById('overlay');
    const shapeSelect = document.getElementById('snake-shape');
    const shapePreview = document.getElementById('shape-preview');

    let gridSize = 20;
    let tileCount = 20; 
    let snake = []; 
    let food = {x: -10, y: -10}; 
    let innerWalls = []; 
    let dx = 1, dy = 0, score = 0, interval, gameRunning = false;

    document.addEventListener("DOMContentLoaded", () => {
        setupBlankCanvas();
    });

    shapeSelect.addEventListener('change', () => {
        const val = shapeSelect.value;
        const previewMap = { 'hexagon': '⬢', 'circle': '●', 'square': '■' };
        shapePreview.innerText = previewMap[val] || val;
    });

    function setupBlankCanvas() {
        const size = parseInt(document.getElementById('arena-size').value) || 400;
        canvas.width = canvas.height = size;
        tileCount = size / gridSize;
        
        ctx.fillStyle = "black";
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        
        const mode = document.getElementById('wall-mode').value;
        canvas.style.border = (mode === 'solid') ? "8px solid #444" : "2px solid var(--accent)";
    }

    function generateMaze() {
        innerWalls = [];
        const complexity = parseInt(document.getElementById('maze-complexity').value) || 0;
        for (let i = 0; i < complexity; i++) {
            let wx = Math.floor(Math.random() * tileCount);
            let wy = Math.floor(Math.random() * tileCount);
            if (Math.abs(wx - 10) > 3 || Math.abs(wy - 10) > 3) {
                innerWalls.push({x: wx, y: wy});
            }
        }
    }

    function spawnFood() {
        let valid = false;
        let attempts = 0;
        while (!valid && attempts < 200) {
            food = { x: Math.floor(Math.random() * tileCount), y: Math.floor(Math.random() * tileCount) };
            const inSnake = snake.some(s => s.x === food.x && s.y === food.y);
            const inWall = innerWalls.some(w => w.x === food.x && w.y === food.y);
            if (!inSnake && !inWall) valid = true;
            attempts++;
        }
    }

    function startGame() {
        ui.classList.add('frozen');
        startBtn.disabled = true;
        overlay.style.display = 'none';
        
        setupBlankCanvas();
        snake = [{x: 10, y: 10}, {x: 9, y: 10}, {x: 8, y: 10}];
        generateMaze();
        spawnFood();
        
        dx = 1; dy = 0; score = 0;
        document.getElementById('score-val').innerText = "0";

        draw();
        
        const speedVal = parseInt(document.getElementById('snake-speed').value) || 5;
        const delay = 210 - (speedVal * 15);

        gameRunning = true;
        if(interval) clearInterval(interval);
        interval = setInterval(update, delay);
    }

    function update() {
        if (!gameRunning) return;
        const head = {x: snake[0].x + dx, y: snake[0].y + dy};
        const wallMode = document.getElementById('wall-mode').value;

        if (wallMode === 'solid') {
            if (head.x < 0 || head.x >= tileCount || head.y < 0 || head.y >= tileCount) return gameOver();
        } else {
            if (head.x < 0) head.x = tileCount - 1;
            if (head.x >= tileCount) head.x = 0;
            if (head.y < 0) head.y = tileCount - 1;
            if (head.y >= tileCount) head.y = 0;
        }

        if (innerWalls.some(w => w.x === head.x && w.y === head.y)) return gameOver();
        if (snake.some(s => s.x === head.x && s.y === head.y)) return gameOver();

        snake.unshift(head);
        if (head.x === food.x && head.y === food.y) {
            score += 10;
            document.getElementById('score-val').innerText = score;
            spawnFood();
        } else {
            snake.pop();
        }
        draw();
    }

    function draw() {
        ctx.fillStyle = "black";
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        const mode = document.getElementById('wall-mode').value;
        canvas.style.border = (mode === 'solid') ? "8px solid #444" : "2px solid var(--accent)";

        ctx.font = "16px Arial";
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        innerWalls.forEach(w => { ctx.fillText("💀", w.x * gridSize + 10, w.y * gridSize + 10); });

        ctx.fillStyle = "#ff4757";
        ctx.beginPath(); ctx.arc(food.x * gridSize + 10, food.y * gridSize + 10, 7, 0, Math.PI * 2); ctx.fill();

        const color = document.getElementById('snake-color').value;
        const headShape = document.getElementById('snake-shape').value;
        
        snake.forEach((seg, i) => {
            const px = seg.x * gridSize; const py = seg.y * gridSize;
            if (i === 0) {
                ctx.fillStyle = "white";
                if (['😀','😁','😉','🤩'].includes(headShape)) {
                    ctx.font = "18px Arial"; ctx.fillText(headShape, px + 10, py + 12);
                } else if (headShape === 'hexagon') {
                    ctx.fillStyle = color; ctx.beginPath();
                    for (let n = 0; n < 6; n++) ctx.lineTo(px + 10 + 9 * Math.cos(n * Math.PI / 3), py + 10 + 9 * Math.sin(n * Math.PI / 3));
                    ctx.closePath(); ctx.fill();
                } else if (headShape === 'circle') {
                    ctx.fillStyle = color; ctx.beginPath(); ctx.arc(px+10, py+10, 9, 0, Math.PI*2); ctx.fill();
                } else {
                    ctx.fillStyle = color; ctx.fillRect(px+1, py+1, 18, 18);
                }
            } else {
                ctx.fillStyle = color; ctx.globalAlpha = 0.6; ctx.fillRect(px+3, py+3, 14, 14); ctx.globalAlpha = 1.0;
            }
        });
    }

    function gameOver() {
        gameRunning = false;
        clearInterval(interval);
        const mode = document.getElementById('wall-mode').value;
        const sizeText = document.getElementById('arena-size').options[document.getElementById('arena-size').selectedIndex].text;
        const skulls = document.getElementById('maze-complexity').value;
        const color = document.getElementById('snake-color').value;
        const shape = document.getElementById('snake-shape').value;
        const speed = document.getElementById('snake-speed').value;
        
        document.getElementById('final-stats').innerHTML = `<b>Final Score: ${score}</b><br><br>Arena: ${sizeText}<br>Mode: ${mode.toUpperCase()}<br>Complexity: ${skulls} Skulls<br>Speed: ${speed}`;
        overlay.style.display = 'flex';

        if (typeof window.triggerDatabaseSave === 'function') {
            window.triggerDatabaseSave({ score, mode, sizeText, skulls, color, shape, speed, innerWalls });
        }
    }

    function unlockAndReset() {
        ui.classList.remove('frozen');
        startBtn.disabled = false;
        overlay.style.display = 'none';
        setupBlankCanvas();
    }

    window.addEventListener('keydown', e => {
        if(["ArrowUp","ArrowDown","ArrowLeft","ArrowRight"].indexOf(e.code) > -1) e.preventDefault();
        if (!gameRunning) return;
        const moves = { 'ArrowUp': [0, -1], 'ArrowDown': [0, 1], 'ArrowLeft': [-1, 0], 'ArrowRight': [1, 0] };
        if (moves[e.key]) {
            const [newDx, newDy] = moves[e.key];
            if (newDx !== -dx && newDy !== -dy) { dx = newDx; dy = newDy; }
        }
    });

    startBtn.addEventListener('click', startGame);
    document.getElementById('arena-size').addEventListener('change', setupBlankCanvas);
    document.getElementById('wall-mode').addEventListener('change', setupBlankCanvas);
</script>

<script id="database-engine">
    document.addEventListener("DOMContentLoaded", () => {
        const scoreboard = document.getElementById('score-board');
        const lbStatus = document.getElementById('leaderboard-status');
        let connectionAttempts = 0;

        function connectToDatabase() {
            if (window.supabaseClient) {
                lbStatus.innerText = "Loading global ranks...";
                fetchLeaderboard();
            } else {
                connectionAttempts++;
                if (connectionAttempts > 15) {
                    lbStatus.innerText = "Leaderboard Offline.";
                    return;
                }
                setTimeout(connectToDatabase, 500); 
            }
        }
        connectToDatabase();

        async function fetchLeaderboard() {
            try {
                const { data, error } = await window.supabaseClient.from('scores').select('*').order('score', { ascending: false }).limit(15);
                if (error) throw error;
                
                if (!data || data.length === 0) {
                    scoreboard.innerHTML = '<div style="padding:10px; color:#8b949e;">No scores yet.</div>';
                    return;
                }

                scoreboard.innerHTML = data.map(entry => {
                    let user = entry.user_email ? String(entry.user_email).split('@')[0] : 'Guest';
                    let mode = entry.wall_mode ? String(entry.wall_mode).toUpperCase() : 'N/A';
                    let size = entry.arena_size || 'N/A';
                    let skulls = entry.maze_complexity != null ? entry.maze_complexity : '0';
                    let spd = entry.snake_speed || '5';

                    return `
                    <div class="score-item">
                        <strong>${user}</strong> 
                        <span style="float:right; color:var(--success); font-weight:bold">${entry.score}</span>
                        <div class="score-meta">${size} • ${mode} • ${skulls} Skulls • Spd: ${spd}</div>
                    </div>
                    `;
                }).join('');
            } catch (err) { 
                scoreboard.innerHTML = `<div style="padding:10px; color:var(--danger)">Offline: Unable to load scores.</div>`; 
            }
        }

        window.triggerDatabaseSave = async function(gameData) {
            if (!window.supabaseClient) {
                alert("Cannot save: Supabase client is not connected.");
                return;
            }
            try {
                console.log("Attempting to save to Supabase...", gameData);
                
                const { error } = await window.supabaseClient.from('scores').insert([{
                    user_email: 'vinothraja@example.com',
                    game: 'Snake',
                    score: gameData.score,
                    snake_color: gameData.color,
                    snake_shape: gameData.shape,
                    wall_mode: gameData.mode,
                    maze_complexity: parseInt(gameData.skulls),
                    arena_size: gameData.sizeText,
                    snake_speed: parseInt(gameData.speed),
                    inner_walls: JSON.stringify(gameData.innerWalls)
                }]);
                
                if (error) {
                    console.error("Supabase Error Details:", error);
                    alert(`Supabase Error: ${error.message}\n\nHint: ${error.hint || 'Check your console (F12) for details.'}`);
                    return;
                }
                
                fetchLeaderboard(); 
            } catch (err) { 
                alert(`Unexpected Save Error: ${err.message}`);
                console.error('Save failed:', err); 
            }
        };
    });
</script>

</body>
</html>
