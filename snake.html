<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ultimate Snake Game</title>
    <style>
        :root {
            --bg-color: #0f3460;
            --accent-color: #43bccd;
            --danger-color: #e94560;
        }
        body { background-color: #1a1a2e; color: white; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        #game-container { text-align: center; margin-top: 20px; }
        
        /* Menu Styling */
        #menu {
            background: rgba(15, 52, 96, 0.9);
            padding: 20px;
            border-radius: 12px;
            width: 350px;
            margin: 0 auto;
            border: 2px solid var(--accent-color);
        }
        .option-group { margin-bottom: 15px; text-align: left; }
        label { display: block; margin-bottom: 5px; font-size: 14px; color: var(--accent-color); }
        select, input { width: 100%; padding: 8px; border-radius: 4px; border: none; background: #16213e; color: white; }
        
        button#start-btn {
            background: var(--accent-color);
            border: none;
            padding: 10px 20px;
            color: #1a1a2e;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            border-radius: 4px;
            font-size: 16px;
        }

        canvas { 
            background-color: #000; 
            border: 4px solid var(--bg-color); 
            border-radius: 8px; 
            box-shadow: 0 0 15px var(--accent-color);
            display: none; 
        }

        .hidden { display: none !important; }
        .play-btn { text-decoration: none; color: var(--accent-color); font-weight: bold; }
    </style>
</head>
<body>

    <div id="game-container">
        <header style="display: flex; justify-content: space-between; width: 400px; margin: 0 auto 20px;">
            <a href="dashboard.html" class="play-btn">&larr; Back</a>
            <h2 style="margin: 0;">Score: <span id="score-display">0</span></h2>
        </header>

        <div id="menu">
            <h3>Game Settings</h3>
            <div class="option-group">
                <label>Wall Mode</label>
                <select id="wall-mode">
                    <option value="solid">Solid (Game Over on hit)</option>
                    <option value="pass">Ghost (Go Through Walls)</option>
                </select>
            </div>
            <div class="option-group">
                <label>Snake Shape</label>
                <select id="snake-shape">
                    <option value="square">Square</option>
                    <option value="circle">Circle</option>
                    <option value="triangle">Triangle</option>
                    <option value="hexagon">Hexagon</option>
                </select>
            </div>
            <div class="option-group">
                <label>Snake Color</label>
                <input type="color" id="snake-color" value="#43bccd">
            </div>
            <button id="start-btn">START GAME</button>
        </div>

        <canvas id="gameCanvas" width="400" height="400"></canvas>
        <p id="game-over-text" style="display: none; color: #e94560; font-weight: bold; font-size: 20px;">
            Game Over! <br> <button onclick="location.reload()" style="background:none; border:1px solid; color:white; cursor:pointer; padding:5px;">Restart</button>
        </p>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        const scoreDisplay = document.getElementById("score-display");
        const menu = document.getElementById("menu");
        const startBtn = document.getElementById("start-btn");
        
        // Game Settings
        const gridSize = 20;
        const tileCount = canvas.width / gridSize;
        let score = 0;
        let dx = 0, dy = 0;
        let snake = [{x: 10, y: 10}];
        let food = {x: 5, y: 5};
        let gameSpeed = 100;
        let wallMode = 'solid';
        let snakeShape = 'square';
        let snakeColor = '#43bccd';
        let gameInterval;

        startBtn.addEventListener('click', startGame);

        function startGame() {
            wallMode = document.getElementById('wall-mode').value;
            snakeShape = document.getElementById('snake-shape').value;
            snakeColor = document.getElementById('snake-color').value;
            
            // Adjust speed: Ghost mode is slightly faster to compensate for ease
            gameSpeed = (wallMode === 'pass') ? 80 : 110;
            
            // UI Switch
            menu.classList.add('hidden');
            canvas.style.display = "inline-block";
            
            // Canvas border representation
            canvas.style.borderColor = (wallMode === 'pass') ? "#00ff00" : "#e94560";
            
            dx = 1; // Start moving right
            spawnFood();
            gameInterval = setInterval(update, gameSpeed);
        }

        function update() {
            moveSnake();
            if (checkGameOver()) return;
            checkFood();
            draw();
        }

        function moveSnake() {
            const head = { x: snake[0].x + dx, y: snake[0].y + dy };

            if (wallMode === 'pass') {
                if (head.x < 0) head.x = tileCount - 1;
                if (head.x >= tileCount) head.x = 0;
                if (head.y < 0) head.y = tileCount - 1;
                if (head.y >= tileCount) head.y = 0;
            }

            snake.unshift(head);
            if (head.x === food.x && head.y === food.y) {
                score += 10;
                scoreDisplay.innerText = score;
                spawnFood();
            } else {
                snake.pop();
            }
        }

        function checkGameOver() {
            const head = snake[0];
            
            // Wall Collision (only if solid)
            if (wallMode === 'solid') {
                if (head.x < 0 || head.x >= tileCount || head.y < 0 || head.y >= tileCount) {
                    return endGame();
                }
            }

            // Self Collision
            for (let i = 1; i < snake.length; i++) {
                if (head.x === snake[i].x && head.y === snake[i].y) return endGame();
            }
            return false;
        }

        function endGame() {
            clearInterval(gameInterval);
            document.getElementById('game-over-text').style.display = "block";
            return true;
        }

        function spawnFood() {
            // Fix: Ensure food does not spawn inside snake body
            let valid = false;
            while (!valid) {
                food.x = Math.floor(Math.random() * tileCount);
                food.y = Math.floor(Math.random() * tileCount);
                valid = !snake.some(segment => segment.x === food.x && segment.y === food.y);
            }
        }

        function draw() {
            // Clear Background
            ctx.fillStyle = "black";
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Draw Food
            ctx.fillStyle = "#ff0042";
            ctx.beginPath();
            ctx.arc(food.x * gridSize + gridSize/2, food.y * gridSize + gridSize/2, gridSize/3, 0, Math.PI * 2);
            ctx.fill();

            // Draw Snake
            ctx.fillStyle = snakeColor;
            snake.forEach((segment, index) => {
                const px = segment.x * gridSize;
                const py = segment.y * gridSize;
                
                ctx.beginPath();
                if (snakeShape === 'circle') {
                    ctx.arc(px + gridSize/2, py + gridSize/2, gridSize/2 - 1, 0, Math.PI * 2);
                } else if (snakeShape === 'triangle') {
                    ctx.moveTo(px + gridSize/2, py);
                    ctx.lineTo(px, py + gridSize);
                    ctx.lineTo(px + gridSize, py + gridSize);
                } else if (snakeShape === 'hexagon') {
                    for (let i = 0; i < 6; i++) {
                        ctx.lineTo(px + gridSize/2 + gridSize/2 * Math.cos(i * Math.PI / 3), 
                                   py + gridSize/2 + gridSize/2 * Math.sin(i * Math.PI / 3));
                    }
                } else { // Square
                    ctx.rect(px + 1, py + 1, gridSize - 2, gridSize - 2);
                }
                ctx.fill();
                ctx.closePath();
            });
        }

        window.addEventListener("keydown", e => {
            switch (e.key) {
                case "ArrowUp": if (dy !== 1) { dx = 0; dy = -1; } break;
                case "ArrowDown": if (dy !== -1) { dx = 0; dy = 1; } break;
                case "ArrowLeft": if (dx !== 1) { dx = -1; dy = 0; } break;
                case "ArrowRight": if (dx !== -1) { dx = 1; dy = 0; } break;
            }
        });
    </script>
</body>
</html>
