<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Snake Pro - Vinoth Raja</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase.js"></script>
    <style>
        :root {
            --bg: #0b0e14; --panel: #161b22; --accent: #58a6ff;
            --danger: #f85149; --success: #3fb950;
        }
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; }
        
        #main-layout {
            display: grid;
            grid-template-columns: 300px 1fr 300px;
            height: 100vh; gap: 10px; padding: 10px; box-sizing: border-box;
        }

        aside { background: var(--panel); padding: 15px; border-radius: 8px; display: flex; flex-direction: column; gap: 12px; border: 1px solid #30363d; }
        
        /* Added spacing between settings rows */
        .input-group { 
            display: flex; 
            flex-direction: column; 
            gap: 8px; 
            font-size: 0.85rem; 
            margin-bottom: 15px; 
        }
        
        select, input[type="range"] { 
            background: #0d1117; color: white; border: 1px solid #30363d; padding: 8px; border-radius: 4px; 
        }

        .nav-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
        .back-btn { text-decoration: none; color: var(--accent); font-weight: bold; font-size: 0.9rem; }
        
        .btn {
            background: var(--success); border: none; color: white; padding: 12px;
            border-radius: 4px; cursor: pointer; font-weight: bold; transition: 0.2s;
        }
        .btn:disabled { background: #30363d; cursor: not-allowed; opacity: 0.5; }

        #game-area { display: flex; align-items: center; justify-content: center; position: relative; background: #000; border-radius: 8px; border: 2px solid #30363d; }
        canvas { background: #000; display: block; }

        .score-item { padding: 10px; border-bottom: 1px solid #30363d; font-size: 0.75rem; }
        .score-meta { color: #8b949e; font-size: 0.7rem; margin-top: 4px; }

        .frozen { opacity: 0.4; pointer-events: none; }

        #shape-preview {
            width: 40px; height: 40px; border: 1px solid #58a6ff; 
            border-radius: 4px; display: flex; align-items: center; 
            justify-content: center; font-size: 24px; background: #0d1117;
        }

        #overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85); display: flex; flex-direction: column;
            align-items: center; justify-content: center; display: none; z-index: 10;
        }
    </style>
</head>
<body>

<div id="main-layout">
    <aside id="settings-panel">
        <div class="nav-header">
            <a href="dashboard.html" class="back-btn">&larr; Home</a>
            <h3 style="margin:0; font-size: 1rem; color: var(--accent);">Game Config</h3>
        </div>
        
        <div id="ui-controls">
            <div class="input-group">
                <label>Arena Size</label>
                <select id="arena-size">
                    <option value="300">Small (15x15)</option>
                    <option value="400" selected>Medium (20x20)</option>
                    <option value="600">Large (30x30)</option>
                </select>
            </div>
            <div class="input-group">
                <label>Wall Mode</label>
                <select id="wall-mode">
                    <option value="solid">Solid (Thick Walls)</option>
                    <option value="pass">Ghost (Pass-thru Walls)</option>
                </select>
            </div>
            <div class="input-group">
                <label>Maze Complexity (💀 Skulls)</label>
                <input type="range" id="maze-complexity" min="0" max="30" value="10">
            </div>
            <div class="input-group">
                <label>Snake Head Shape</label>
                <div style="display: flex; gap: 10px; align-items: center;">
                    <select id="snake-shape" style="flex-grow:1">
                        <option value="😀">Grinning Face (😀)</option>
                        <option value="😁">Beaming Smile (😁)</option>
                        <option value="😉">Winking Face (😉)</option>
                        <option value="🤩">Star-Struck (🤩)</option>
                        <option value="hexagon">Hexagon</option>
                        <option value="circle">Circle</option>
                        <option value="square">Classic Square</option>
                    </select>
                    <div id="shape-preview">😀</div>
                </div>
            </div>
            <div class="input-group">
                <label>Body Color</label>
                <input type="color" id="snake-color" value="#3fb950" style="height:35px; width:100%; cursor:pointer;">
            </div>
        </div>

        <button id="start-btn" class="btn">START MISSION</button>
        
        <div style="margin-top:auto; padding:10px; background:#0d1117; border-radius:4px; text-align: center; border: 1px solid #30363d;">
            <small style="color: #8b949e;">Current Score</small>
            <div id="score-val" style="font-size:2rem; font-weight:bold; color:var(--success)">0</div>
        </div>
    </aside>

    <main id="game-area">
        <canvas id="gameCanvas"></canvas>
        <div id="overlay">
            <h1 style="color:var(--danger); margin-bottom:5px;">MISSION FAILED</h1>
            <p id="final-stats" style="text-align: center; line-height: 1.6; color: #8b949e;"></p>
            <button onclick="unlockAndReset()" class="btn" style="background:var(--accent); margin-top:10px; padding: 10px 30px;">Try Again</button>
        </div>
    </main>

    <aside>
        <h4 style="margin:0 0 10px 0; border-bottom: 1px solid #30363d; padding-bottom: 5px;">Leaderboard</h4>
        <div id="score-board" style="overflow-y:auto; flex-grow: 1;">
            <div id="leaderboard-status" style="padding: 10px; color: #8b949e;">Initialising...</div>
        </div>
    </aside>
</div>

<script>
    // Global variable for the client
    let supabase;

    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const ui = document.getElementById('ui-controls');
    const startBtn = document.getElementById('start-btn');
    const overlay = document.getElementById('overlay');
    const shapeSelect = document.getElementById('snake-shape');
    const shapePreview = document.getElementById('shape-preview');
    const scoreboard = document.getElementById('score-board');
    const lbStatus = document.getElementById('leaderboard-status');

    let gridSize = 20;
    let tileCount, snake, food, innerWalls, dx, dy, score, interval, gameRunning = false;

    // Retry connection logic for Supabase
    function checkConnection() {
        if (window.supabaseClient) {
            supabase = window.supabaseClient;
            lbStatus.innerText = "Loading records...";
            loadLeaderboard();
        } else {
            setTimeout(checkConnection, 500); // Check again in 500ms
        }
    }

    window.onload = () => {
        initLayout();
        checkConnection();
    };

    shapeSelect.addEventListener('change', () => {
        const val = shapeSelect.value;
        const previewMap = { 'hexagon': '⬢', 'circle': '●', 'square': '■' };
        shapePreview.innerText = previewMap[val] || val;
    });

    function initLayout() {
        const size = parseInt(document.getElementById('arena-size').value);
        canvas.width = canvas.height = size;
        tileCount = size / gridSize;
        
        // Initial blank state draw
        ctx.fillStyle = "black";
        ctx.fillRect(0, 0, canvas.width, canvas.height);
    }

    function generateMaze() {
        innerWalls = [];
        const complexity = parseInt(document.getElementById('maze-complexity').value);
        for (let i = 0; i < complexity; i++) {
            let wx = Math.floor(Math.random() * tileCount);
            let wy = Math.floor(Math.random() * tileCount);
            // Safe spawn logic: avoid head start area (10,10)
            if (Math.abs(wx - 10) > 3 || Math.abs(wy - 10) > 3) {
                innerWalls.push({x: wx, y: wy});
            }
        }
    }

    function spawnFood() {
        let valid = false;
        let safetyCounter = 0;
        while (!valid && safetyCounter < 200) {
            food = { x: Math.floor(Math.random() * tileCount), y: Math.floor(Math.random() * tileCount) };
            const inSnake = snake.some(s => s.x === food.x && s.y === food.y);
            const inWall = innerWalls.some(w => w.x === food.x && w.y === food.y);
            if (!inSnake && !inWall) valid = true;
            safetyCounter++;
        }
    }

    function startGame() {
        // UI Lockdown
        ui.classList.add('frozen');
        startBtn.disabled = true;
        overlay.style.display = 'none';
        
        // Recalculate layout based on current settings
        initLayout();
        
        // Initialise game data
        snake = [{x: 10, y: 10}, {x: 9, y: 10}, {x: 8, y: 10}];
        innerWalls = [];
        generateMaze();
        spawnFood();
        
        dx = 1; dy = 0; score = 0;
        document.getElementById('score-val').innerText = "0";

        // Draw first frame immediately
        draw();
        
        gameRunning = true;
        if(interval) clearInterval(interval);
        interval = setInterval(update, 110);
    }

    function update() {
        if (!gameRunning) return;
        const head = {x: snake[0].x + dx, y: snake[0].y + dy};
        const wallMode = document.getElementById('wall-mode').value;

        if (wallMode === 'solid') {
            if (head.x < 0 || head.x >= tileCount || head.y < 0 || head.y >= tileCount) return gameOver();
        } else {
            if (head.x < 0) head.x = tileCount - 1;
            if (head.x >= tileCount) head.x = 0;
            if (head.y < 0) head.y = tileCount - 1;
            if (head.y >= tileCount) head.y = 0;
        }

        if (innerWalls.some(w => w.x === head.x && w.y === head.y)) return gameOver();
        if (snake.some(s => s.x === head.x && s.y === head.y)) return gameOver();

        snake.unshift(head);
        if (head.x === food.x && head.y === food.y) {
            score += 10;
            document.getElementById('score-val').innerText = score;
            spawnFood();
        } else {
            snake.pop();
        }
        draw();
    }

    function draw() {
        ctx.fillStyle = "black";
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        const mode = document.getElementById('wall-mode').value;
        canvas.style.border = (mode === 'solid') ? "8px solid #444" : "2px solid var(--accent)";

        // Draw Skulls
        ctx.font = "16px Arial";
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        innerWalls.forEach(w => {
            ctx.fillText("💀", w.x * gridSize + 10, w.y * gridSize + 10);
        });

        // Draw Food
        ctx.fillStyle = "#ff4757";
        ctx.beginPath();
        ctx.arc(food.x * gridSize + 10, food.y * gridSize + 10, 7, 0, Math.PI * 2);
        ctx.fill();

        // Draw Snake
        const color = document.getElementById('snake-color').value;
        const headShape = document.getElementById('snake-shape').value;
        
        snake.forEach((seg, i) => {
            const px = seg.x * gridSize; const py = seg.y * gridSize;
            if (i === 0) {
                ctx.fillStyle = "white";
                if (['😀','😁','😉','🤩'].includes(headShape)) {
                    ctx.font = "18px Arial";
                    ctx.fillText(headShape, px + 10, py + 12);
                } else if (headShape === 'hexagon') {
                    ctx.fillStyle = color;
                    ctx.beginPath();
                    for (let n = 0; n < 6; n++) {
                        ctx.lineTo(px + 10 + 9 * Math.cos(n * Math.PI / 3), py + 10 + 9 * Math.sin(n * Math.PI / 3));
                    }
                    ctx.closePath(); ctx.fill();
                } else if (headShape === 'circle') {
                    ctx.fillStyle = color;
                    ctx.beginPath(); ctx.arc(px+10, py+10, 9, 0, Math.PI*2); ctx.fill();
                } else {
                    ctx.fillStyle = color;
                    ctx.fillRect(px+1, py+1, 18, 18);
                }
            } else {
                ctx.fillStyle = color;
                ctx.globalAlpha = 0.6;
                ctx.fillRect(px+3, py+3, 14, 14);
                ctx.globalAlpha = 1.0;
            }
        });
    }

    async function gameOver() {
        gameRunning = false;
        clearInterval(interval);
        const mode = document.getElementById('wall-mode').value;
        const sizeText = document.getElementById('arena-size').options[document.getElementById('arena-size').selectedIndex].text;
        const skulls = document.getElementById('maze-complexity').value;
        
        document.getElementById('final-stats').innerHTML = `<b>Final Score: ${score}</b><br>Arena: ${sizeText}<br>Mode: ${mode.toUpperCase()}<br>Complexity: ${skulls} Skulls`;
        overlay.style.display = 'flex';

        if (supabase) {
            try {
                const { error } = await supabase.from('scores').insert([{
                    user_email: 'vinothraja@example.com',
                    game: 'Snake',
                    score: score,
                    snake_color: document.getElementById('snake-color').value,
                    snake_shape: document.getElementById('snake-shape').value,
                    wall_mode: mode,
                    maze_complexity: parseInt(skulls),
                    arena_size: sizeText,
                    inner_walls: JSON.stringify(innerWalls)
                }]);
                if (error) throw error;
                loadLeaderboard();
            } catch (err) { console.error('Save Error:', err.message); }
        }
    }

    async function loadLeaderboard() {
        if (!supabase) return;
        try {
            const { data, error } = await supabase.from('scores').select('*').order('score', { ascending: false }).limit(15);
            if (error) throw error;
            scoreboard.innerHTML = data.map(entry => `
                <div class="score-item">
                    <strong>${entry.user_email.split('@')[0]}</strong> 
                    <span style="float:right; color:var(--success); font-weight:bold">${entry.score}</span>
                    <div class="score-meta">${entry.arena_size} • ${entry.wall_mode.toUpperCase()} • ${entry.maze_complexity} Skulls</div>
                </div>
            `).join('');
        } catch (err) { scoreboard.innerHTML = '<div style="padding:10px; color:var(--danger)">Offline Leaderboard</div>'; }
    }

    function unlockAndReset() {
        ui.classList.remove('frozen');
        startBtn.disabled = false;
        overlay.style.display = 'none';
        initLayout();
    }

    window.addEventListener('keydown', e => {
        if (!gameRunning) return;
        const moves = { 'ArrowUp': [0, -1], 'ArrowDown': [0, 1], 'ArrowLeft': [-1, 0], 'ArrowRight': [1, 0] };
        if (moves[e.key]) {
            const [newDx, newDy] = moves[e.key];
            if (newDx !== -dx && newDy !== -dy) { dx = newDx; dy = newDy; }
        }
    });

    startBtn.addEventListener('click', startGame);
    document.getElementById('arena-size').addEventListener('change', initLayout);
</script>
</body>
</html>
