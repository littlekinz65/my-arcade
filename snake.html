<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Snake Game</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <div id="game-container" style="text-align: center; margin-top: 50px;">
        
        <header style="display: flex; justify-content: space-between; width: 400px; margin: 0 auto 20px;">
            <a href="dashboard.html" class="play-btn" style="margin-top: 0;">&larr; Back</a>
            <h2 style="margin: 0;">Score: <span id="score-display">0</span></h2>
        </header>

        <canvas id="gameCanvas" width="400" height="400" style="background-color: #000; border: 4px solid #0f3460; border-radius: 8px; box-shadow: 0 0 15px #43bccd;"></canvas>
        
        <p id="game-over-text" style="display: none; color: #e94560; font-weight: bold; font-size: 20px;">Game Over! Refresh the page to play again.</p>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase.js"></script>
    <script src="js/snake.js"></script>
</body>
</html>
