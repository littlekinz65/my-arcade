<!DOCTYPE html>
<html lang="en">
<head>
    <meta name="google-site-verification" content="eQY8IH4dQUndOx8GRDz5BCvxHjGqzWSqAKVSd2kuuGU" />
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arcade Login</title>
    <link rel="stylesheet" href="css/style.css">
</head>
    
<body>

    <div id="auth-container">
        <h1>Welcome to the Arcade</h1>
        
        <div id="login-section">
            <h2>Login</h2>
            <input type="email" id="login-email" placeholder="Email">
            <input type="password" id="login-password" placeholder="Password">
            <button id="login-btn">Log In</button>
            <p>Don't have an account? <a href="#" id="show-signup">Sign up here</a></p>
        </div>

        <div id="signup-section" style="display: none;">
            <h2>Sign Up (18+ Only)</h2>
            <input type="text" id="signup-name" placeholder="Full Name">
            <input type="number" id="signup-age" placeholder="Age" min="1">
            <input type="email" id="signup-email" placeholder="Email">
            <input type="password" id="signup-password" placeholder="Password">
            <button id="signup-btn">Create Account</button>
            <p>Already have an account? <a href="#" id="show-login">Log in here</a></p>
        </div>
    </div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <script src="js/supabase.js"></script>
    
    <script src="js/auth.js"></script>

    <script>
        // (Keep the tiny bit of Javascript that flips the login/signup screens down here!)


        // A tiny bit of JavaScript just to flip between Login and Signup screens
        document.getElementById('show-signup').addEventListener('click', function() {
            document.getElementById('login-section').style.display = 'none';
            document.getElementById('signup-section').style.display = 'block';
        });

        document.getElementById('show-login').addEventListener('click', function() {
            document.getElementById('signup-section').style.display = 'none';
            document.getElementById('login-section').style.display = 'block';
        });
    </script>




</body>
</html>
