<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arcade Calculator</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        /* A little extra CSS just for the calculator grid */
        .calc-wrapper { display: flex; gap: 30px; justify-content: center; margin-top: 50px; }
        .calculator { background-color: #16213e; padding: 20px; border-radius: 10px; width: 300px; box-shadow: 0 0 15px #43bccd; }
        .display { background-color: #0f3460; color: white; font-size: 32px; text-align: right; padding: 15px; border-radius: 5px; margin-bottom: 20px; word-wrap: break-word; min-height: 40px;}
        .buttons-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
        .btn-calc { padding: 15px; font-size: 20px; border: none; border-radius: 5px; cursor: pointer; background-color: #0f3460; color: white; transition: 0.2s; }
        .btn-calc:hover { background-color: #e94560; }
        .btn-op { background-color: #43bccd; color: #1a1a2e; font-weight: bold; }
        .btn-span-2 { grid-column: span 2; }
        
        .history-panel { background-color: #16213e; padding: 20px; border-radius: 10px; width: 250px; color: white; text-align: left; max-height: 400px; overflow-y: auto;}
        .history-item { border-bottom: 1px solid #0f3460; padding: 10px 0; font-family: monospace; font-size: 16px;}
    </style>
</head>
<body>

    <header style="text-align: center; margin-top: 20px;">
        <a href="dashboard.html" class="play-btn">&larr; Back to Dashboard</a>
    </header>

    <div class="calc-wrapper">
        <div class="calculator">
            <div class="display" id="calc-display">0</div>
            <div class="buttons-grid">
                <button class="btn-calc btn-span-2" onclick="clearDisplay()">CLEAR</button>
                <button class="btn-calc btn-op" onclick="chooseOperation('/')">&divide;</button>
                <button class="btn-calc btn-op" onclick="chooseOperation('*')">&times;</button>
                
                <button class="btn-calc" onclick="appendNumber('7')">7</button>
                <button class="btn-calc" onclick="appendNumber('8')">8</button>
                <button class="btn-calc" onclick="appendNumber('9')">9</button>
                <button class="btn-calc btn-op" onclick="chooseOperation('-')">-</button>
                
                <button class="btn-calc" onclick="appendNumber('4')">4</button>
                <button class="btn-calc" onclick="appendNumber('5')">5</button>
                <button class="btn-calc" onclick="appendNumber('6')">6</button>
                <button class="btn-calc btn-op" onclick="chooseOperation('+')">+</button>
                
                <button class="btn-calc" onclick="appendNumber('1')">1</button>
                <button class="btn-calc" onclick="appendNumber('2')">2</button>
                <button class="btn-calc" onclick="appendNumber('3')">3</button>
                <button class="btn-calc btn-op" rowspan="2" style="grid-row: span 2;" onclick="compute()">=</button>
                
                <button class="btn-calc btn-span-2" onclick="appendNumber('0')">0</button>
                <button class="btn-calc" onclick="appendNumber('.')">.</button>
            </div>
        </div>

        <div class="history-panel">
            <h3 style="margin-top: 0; color: #43bccd;">Your History</h3>
            <div id="history-list">
                <p style="font-size: 14px; color: #888;">Loading history...</p>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase.js"></script>
    <script src="js/calculator.js"></script>
</body>
</html>
